<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0418" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DRIFT // synthwave asteroids</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud" class="hidden">
      <div class="hud-row top">
        <div class="hud-block">
          <div class="label">SCORE</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="hud-block right">
          <div class="label">WAVE</div>
          <div id="wave" class="value">1</div>
        </div>
      </div>
      <div class="hud-row mid">
        <div id="combo" class="combo hidden">
          <span id="combo-x">x1</span>
          <div id="combo-bar"><div id="combo-fill"></div></div>
        </div>
      </div>
      <div class="hud-row bottom">
        <div class="hud-block">
          <div class="label">BEST</div>
          <div id="best" class="value">0</div>
        </div>
        <div id="lives" class="lives"></div>
      </div>
    </div>

    <div id="overlay" class="overlay visible">
      <div class="overlay-inner">
        <h1 class="title">
          <span class="title-glitch" data-text="DRIFT">DRIFT</span>
        </h1>
        <p class="sub">synthwave asteroids // endless</p>
        <div class="how">
          <p><span class="kbd">drag</span> anywhere to move</p>
          <p>ship auto-aims &amp; fires</p>
          <p>collect combo orbs to multiply score</p>
        </div>
        <p class="kb-how">keyboard: <span class="kbd">WASD</span> or <span class="kbd">arrows</span></p>
        <button id="start" class="cta">START</button>
        <div class="stats">
          <div>BEST SCORE <span id="best-score-menu">0</span></div>
          <div>BEST WAVE <span id="best-wave-menu">0</span></div>
          <div>BEST COMBO <span id="best-combo-menu">0</span></div>
        </div>
      </div>
    </div>

    <div id="upgrade-screen" class="overlay">
      <div class="overlay-inner">
        <h2 class="upgrade-title">WAVE <span id="upgrade-wave">1</span> CLEAR</h2>
        <p class="sub">choose an upgrade</p>
        <div id="upgrade-cards" class="upgrade-cards"></div>
      </div>
    </div>

    <div id="gameover-screen" class="overlay">
      <div class="overlay-inner">
        <h2 class="title">
          <span class="title-glitch" data-text="GAME OVER">GAME OVER</span>
        </h2>
        <div class="stats big">
          <div>SCORE <span id="go-score">0</span></div>
          <div>WAVE <span id="go-wave">0</span></div>
          <div>MAX COMBO <span id="go-combo">0</span></div>
        </div>
        <div id="new-record" class="new-record hidden">NEW RECORD</div>
        <button id="retry" class="cta">RUN IT BACK</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
